# Join Events — CI pipeline
# Runs on every push + PR to main. Three jobs in parallel: typecheck/lint/test.
# Tests use a real Postgres + Redis service container.

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9.12.0
  NODE_VERSION: 20.18.0

jobs:
  # --------------------------------------------------------------
  # Static checks: typecheck both apps, lint both apps, prisma drift
  # --------------------------------------------------------------
  static:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (web + api)
        run: pnpm typecheck

      - name: Lint (web + api)
        run: pnpm lint

      - name: Prisma format check
        run: pnpm --filter @joinevents/api exec prisma format --check --schema=./prisma/schema.prisma

  # --------------------------------------------------------------
  # Integration tests against real Postgres + Redis service containers
  # --------------------------------------------------------------
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: joinevents
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: joinevents_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U joinevents -d joinevents_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://joinevents:testpass@localhost:5432/joinevents_test
      DATABASE_URL_TEST: postgresql://joinevents:testpass@localhost:5432/joinevents_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-at-least-32-chars-yes-yes-yes
      QUEUE_DISABLED: 'true'
      OTP_RETURN_IN_RESPONSE: 'true'
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Enable PostGIS
        run: |
          PGPASSWORD=testpass psql -h localhost -U joinevents -d joinevents_test \
            -c 'CREATE EXTENSION IF NOT EXISTS postgis;' \
            -c 'CREATE EXTENSION IF NOT EXISTS "pgcrypto";'

      - name: Run migrations
        run: pnpm --filter @joinevents/api exec prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Test (wallet + bookings integration)
        run: pnpm --filter @joinevents/api test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/api/coverage

  # --------------------------------------------------------------
  # Build both apps (catches build-time errors CI didn't catch above)
  # --------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [static]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next
          retention-days: 7
