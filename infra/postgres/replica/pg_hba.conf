# Postgres host-based authentication for the streaming-replication setup.
# Mounted onto the primary at /etc/postgresql/pg_hba.conf.

# TYPE  DATABASE        USER         ADDRESS                METHOD
local   all             all                                 trust
host    all             all          127.0.0.1/32           trust
host    all             all          ::1/128                trust
host    all             all          all                    md5

# Replication users may connect from anywhere on the Docker network.
host    replication     replicator   0.0.0.0/0              md5
host    replication     replicator   ::/0                   md5
