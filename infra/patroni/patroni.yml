# Patroni — high-availability automated-failover orchestrator for Postgres.
#
# Use this on self-managed Kubernetes / VMs (instead of DigitalOcean Managed).
# Patroni elects a leader, promotes a replica on primary failure, and reconfigures
# clients via Consul/etcd DNS.
#
# Run:
#   patroni patroni.yml
#
# Reference: https://patroni.readthedocs.io/

scope: joinevents
namespace: /joinevents/
name: pg-primary-0   # override per host: pg-primary-0, pg-replica-1, pg-replica-2

restapi:
  listen: 0.0.0.0:8008
  connect_address: ${HOST_IP}:8008

# Distributed coordinator — use etcd in production. Consul also works.
etcd3:
  hosts:
    - etcd-0:2379
    - etcd-1:2379
    - etcd-2:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: 'on'
        wal_keep_size: 256
        max_wal_senders: 10
        max_replication_slots: 10
        max_connections: 200
        archive_mode: 'on'
        archive_command: 'true'    # replace with WAL-G or pgBackRest in prod

  initdb:
    - encoding: UTF8
    - data-checksums

  pg_hba:
    - host all all 0.0.0.0/0 md5
    - host replication replicator 0.0.0.0/0 md5

  users:
    replicator:
      password: ${REPLICATOR_PASSWORD}
      options:
        - replication
    admin:
      password: ${ADMIN_PASSWORD}
      options:
        - createrole
        - createdb

postgresql:
  listen: 0.0.0.0:5432
  connect_address: ${HOST_IP}:5432
  data_dir: /var/lib/postgresql/data
  bin_dir: /usr/lib/postgresql/16/bin
  pgpass: /tmp/pgpass
  authentication:
    replication:
      username: replicator
      password: ${REPLICATOR_PASSWORD}
    superuser:
      username: postgres
      password: ${POSTGRES_PASSWORD}
  parameters:
    unix_socket_directories: '/var/run/postgresql'

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
